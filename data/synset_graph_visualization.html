<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WordNet + ConceptNet Synset Graph</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --ink: #23272f;
      --muted: #667085;
      --panel: #ffffff;
      --line: #d9d4ca;
      --accent: #2f6f9f;
      --focus: #b13434;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      overflow: hidden;
    }
    .app {
      display: grid;
      grid-template-columns: 340px 1fr 320px;
      height: 100vh;
      min-height: 640px;
    }
    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 18px;
      overflow: auto;
    }
    aside.right {
      border-right: 0;
      border-left: 1px solid var(--line);
    }
    h1 {
      font-size: 20px;
      line-height: 1.2;
      margin: 0 0 14px;
      letter-spacing: 0;
    }
    h2 {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      margin: 22px 0 8px;
      letter-spacing: 0;
    }
    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 12px 0 6px;
    }
    input[type="text"], select, input[type="range"] {
      width: 100%;
    }
    input[type="text"], select {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      font-size: 14px;
      background: #fff;
      color: var(--ink);
    }
    .checks {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    .checks label {
      display: flex;
      align-items: center;
      gap: 7px;
      margin: 0;
      color: var(--ink);
    }
    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    main {
      position: relative;
      min-width: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #fbfaf7;
    }
    .hud {
      position: absolute;
      left: 16px;
      bottom: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: none;
    }
    .pill {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend {
      display: grid;
      gap: 7px;
      font-size: 13px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .swatch {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    .edge-swatch {
      width: 22px;
      height: 3px;
      border-radius: 2px;
      display: inline-block;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
    }
    .stat strong {
      display: block;
      font-size: 20px;
    }
    .stat span {
      color: var(--muted);
      font-size: 12px;
    }
    .details {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
      min-height: 150px;
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .details .id {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .muted { color: var(--muted); }
    .list {
      max-height: 190px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
    }
    .list button {
      width: 100%;
      border: 0;
      border-bottom: 1px solid var(--line);
      border-radius: 0;
      text-align: left;
      background: transparent;
      padding: 7px 9px;
    }
    .list button:last-child { border-bottom: 0; }
    @media (max-width: 980px) {
      body { overflow: auto; }
      .app {
        grid-template-columns: 1fr;
        height: auto;
      }
      main { height: 70vh; min-height: 520px; }
      aside, aside.right {
        border: 0;
        border-bottom: 1px solid var(--line);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1>WordNet + ConceptNet Synset Graph</h1>
      <div class="stats">
        <div class="stat"><strong id="visibleNodes">0</strong><span>visible nodes</span></div>
        <div class="stat"><strong id="visibleEdges">0</strong><span>visible edges</span></div>
      </div>

      <label for="search">Search synset or lemma</label>
      <input id="search" type="text" placeholder="dog, abdomen, move.v.02">
      <div class="button-row">
        <button id="focusBtn" class="primary">Focus</button>
        <button id="clearBtn">Clear</button>
      </div>

      <label for="relation">Relation</label>
      <select id="relation"></select>

      <label for="degree">Minimum visible degree: <span id="degreeValue">0</span></label>
      <input id="degree" type="range" min="0" max="10" value="0">

      <h2>Node POS</h2>
      <div class="checks" id="posChecks"></div>

      <h2>Edge Source</h2>
      <div class="checks" id="sourceChecks"></div>

      <h2>View</h2>
      <div class="button-row">
        <button id="fitBtn">Fit</button>
        <button id="restartBtn">Restart</button>
      </div>
    </aside>

    <main>
      <canvas id="graph"></canvas>
      <div class="hud">
        <div class="pill">Drag nodes</div>
        <div class="pill">Scroll to zoom</div>
        <div class="pill">Click a node for details</div>
      </div>
    </main>

    <aside class="right">
      <h2>Legend</h2>
      <div class="legend">
        <div class="legend-row"><span class="swatch" style="background:#2f6f9f"></span>Noun</div>
        <div class="legend-row"><span class="swatch" style="background:#b65f2a"></span>Verb</div>
        <div class="legend-row"><span class="swatch" style="background:#5b8c3a"></span>Adjective</div>
        <div class="legend-row"><span class="edge-swatch" style="background:#5b6472"></span>WordNet edge</div>
        <div class="legend-row"><span class="edge-swatch" style="background:#2f8f83"></span>ConceptNet edge</div>
      </div>

      <h2>Selection</h2>
      <div class="details" id="details">
        <div class="muted">Search or click a node.</div>
      </div>

      <h2>Search Results</h2>
      <div class="list" id="results"></div>

      <h2>Top Degree Nodes</h2>
      <div class="list" id="topNodes"></div>
    </aside>
  </div>

    const nodeById = new Map(nodes.map(n => [n.id, n]));
    const edges = GRAPH.edges
      .filter(e => nodeById.has(e.source) && nodeById.has(e.target))
      .map(e => ({...e, sourceNode: nodeById.get(e.source), targetNode: nodeById.get(e.target)}));
    const stats = GRAPH.stats;
    const posColors = GRAPH.posColors;
    const sourceColors = GRAPH.sourceColors;

    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");
    const search = document.getElementById("search");
    const relation = document.getElementById("relation");
    const degree = document.getElementById("degree");
    const degreeValue = document.getElementById("degreeValue");
    const details = document.getElementById("details");
    const results = document.getElementById("results");
    const visibleNodes = document.getElementById("visibleNodes");
    const visibleEdges = document.getElementById("visibleEdges");

    let selected = null;
    let focusedIds = null;
    let scale = 1;
    let offsetX = 0;
    let offsetY = 0;
    let dragging = null;
    let lastMouse = null;
    let alpha = 1;

    const allRelations = Array.from(new Set(edges.map(e => e.relation))).sort();
    relation.innerHTML = `<option value="">All relations</option>` + allRelations.map(r => `<option>${r}</option>`).join("");

    const posChecks = document.getElementById("posChecks");
    Object.keys(stats.pos_counts).sort().forEach(pos => {
      posChecks.insertAdjacentHTML("beforeend", `<label><input type="checkbox" value="${pos}" checked> ${pos}</label>`);
    });
    const sourceChecks = document.getElementById("sourceChecks");
    Object.keys(stats.source_type_counts).sort().forEach(src => {
      sourceChecks.insertAdjacentHTML("beforeend", `<label><input type="checkbox" value="${src}" checked> ${src}</label>`);
    });

    const topNodes = document.getElementById("topNodes");
    stats.top_degree_nodes.forEach(item => {
      const n = nodeById.get(item.id);
      if (!n) return;
      const btn = document.createElement("button");
      btn.textContent = `${n.primary_lemma || n.id} · ${item.degree}`;
      btn.onclick = () => focusNode(n);
      topNodes.appendChild(btn);
    });

    function checkedValues(container) {
      return new Set(Array.from(container.querySelectorAll("input:checked")).map(i => i.value));
    }

    function currentFilter() {
      return {
        relation: relation.value,
        minDegree: Number(degree.value),
        pos: checkedValues(posChecks),
        sources: checkedValues(sourceChecks)
      };
    }

    function computeVisible() {
      const f = currentFilter();
      const baseEdges = edges.filter(e =>
        (!f.relation || e.relation === f.relation) &&
        f.sources.has(e.source_type) &&
        f.pos.has(e.sourceNode.pos) &&
        f.pos.has(e.targetNode.pos)
      );
      const deg = new Map();
      baseEdges.forEach(e => {
        deg.set(e.source, (deg.get(e.source) || 0) + 1);
        deg.set(e.target, (deg.get(e.target) || 0) + 1);
      });
      let nodeSet = new Set();
      baseEdges.forEach(e => {
        if ((deg.get(e.source) || 0) >= f.minDegree && (deg.get(e.target) || 0) >= f.minDegree) {
          nodeSet.add(e.source);
          nodeSet.add(e.target);
        }
      });
      if (focusedIds) {
        nodeSet = new Set([...nodeSet].filter(id => focusedIds.has(id)));
      }
      const visibleEdgesList = baseEdges.filter(e => nodeSet.has(e.source) && nodeSet.has(e.target));
      const visibleNodesList = nodes.filter(n => nodeSet.has(n.id));
      visibleNodes.textContent = visibleNodesList.length;
      visibleEdges.textContent = visibleEdgesList.length;
      return { visibleNodesList, visibleEdgesList, nodeSet };
    }

    function resize() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      fit(false);
    }

    function fit(kick=true) {
      const rect = canvas.getBoundingClientRect();
      offsetX = rect.width / 2;
      offsetY = rect.height / 2;
      scale = 1;
      if (kick) alpha = 1;
    }

    function step(layout) {
      if (alpha < 0.015) return;
      const visible = layout.visibleNodesList;
      const visibleSet = layout.nodeSet;

      for (const n of visible) {
        n.vx += (-n.x) * 0.0008 * alpha;
        n.vy += (-n.y) * 0.0008 * alpha;
      }

      for (const e of layout.visibleEdgesList) {
        const a = e.sourceNode;
        const b = e.targetNode;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.max(1, Math.hypot(dx, dy));
        const target = e.source_type === "wordnet" ? 90 : 130;
        const force = (dist - target) * 0.0009 * alpha;
        const fx = dx / dist * force;
        const fy = dy / dist * force;
        if (!a.fixed) { a.vx += fx; a.vy += fy; }
        if (!b.fixed) { b.vx -= fx; b.vy -= fy; }
      }

      for (let i = 0; i < visible.length; i++) {
        const a = visible[i];
        for (let j = i + 1; j < visible.length; j++) {
          const b = visible[j];
          const dx = b.x - a.x;
          const dy = b.y - a.y;
          const dist2 = Math.max(25, dx * dx + dy * dy);
          if (dist2 > 36000) continue;
          const dist = Math.sqrt(dist2);
          const force = 42 / dist2 * alpha;
          const fx = dx / dist * force;
          const fy = dy / dist * force;
          if (!a.fixed) { a.vx -= fx; a.vy -= fy; }
          if (!b.fixed) { b.vx += fx; b.vy += fy; }
        }
      }

      for (const n of visible) {
        if (!n.fixed) {
          n.vx *= 0.88;
          n.vy *= 0.88;
          n.x += n.vx;
          n.y += n.vy;
        }
      }
      alpha *= 0.985;
    }

    function worldToScreen(n) {
      return { x: n.x * scale + offsetX, y: n.y * scale + offsetY };
    }

    function screenToWorld(x, y) {
      return { x: (x - offsetX) / scale, y: (y - offsetY) / scale };
    }

    function draw() {
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      const layout = computeVisible();
      step(layout);

      ctx.lineCap = "round";
      for (const e of layout.visibleEdgesList) {
        const a = worldToScreen(e.sourceNode);
        const b = worldToScreen(e.targetNode);
        ctx.globalAlpha = e.source_type === "wordnet" ? 0.27 : 0.20;
        ctx.strokeStyle = sourceColors[e.source_type] || "#999";
        ctx.lineWidth = e.source_type === "wordnet" ? 1.2 : 1;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      for (const n of layout.visibleNodesList) {
        const p = worldToScreen(n);
        const isSelected = selected && selected.id === n.id;
        const isFocus = focusedIds && focusedIds.has(n.id);
        ctx.fillStyle = posColors[n.pos] || "#777";
        ctx.strokeStyle = isSelected ? "#b13434" : (isFocus ? "#111" : "#fff");
        ctx.lineWidth = isSelected ? 3 : 1.5;
        ctx.beginPath();
        ctx.arc(p.x, p.y, isSelected ? 8 : 5.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
      requestAnimationFrame(draw);
    }

    function nodeAt(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const layout = computeVisible();
      let best = null;
      let bestDist = 90;
      for (const n of layout.visibleNodesList) {
        const p = worldToScreen(n);
        const d = (p.x - x) ** 2 + (p.y - y) ** 2;
        if (d < bestDist) {
          bestDist = d;
          best = n;
        }
      }
      return best;
    }

    function showDetails(n) {
      selected = n;
      if (!n) {
        details.innerHTML = `<div class="muted">Search or click a node.</div>`;
        return;
      }
      const connected = edges.filter(e => e.source === n.id || e.target === n.id).slice(0, 14);
      details.innerHTML = `
        <div class="id">${n.id}</div>
        <div><strong>${n.primary_lemma || ""}</strong> <span class="muted">${n.pos}</span></div>
        <div style="margin-top:6px">${escapeHtml(n.definition || "")}</div>
        <div style="margin-top:8px" class="muted">lemmas: ${n.lemmas.join(", ")}</div>
        <div style="margin-top:10px"><strong>Edges</strong></div>
        <div class="muted">${connected.map(e => `${e.source === n.id ? "→" : "←"} ${e.relation} ${e.source === n.id ? e.target : e.source}`).join("<br>") || "No visible edge summary."}</div>
      `;
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function searchNodes(q) {
      const query = q.trim().toLowerCase();
      if (!query) return [];
      return nodes.filter(n =>
        n.id.toLowerCase().includes(query) ||
        n.primary_lemma.toLowerCase().includes(query) ||
        n.lemmas.some(l => l.toLowerCase().includes(query)) ||
        n.definition.toLowerCase().includes(query)
      ).slice(0, 40);
    }

    function renderResults(items) {
      results.innerHTML = "";
      if (!items.length) {
        results.innerHTML = `<button disabled>No matches</button>`;
        return;
      }
      items.forEach(n => {
        const btn = document.createElement("button");
        btn.textContent = `${n.primary_lemma || n.id} · ${n.id}`;
        btn.onclick = () => focusNode(n);
        results.appendChild(btn);
      });
    }

    function focusNode(n) {
      const neighborIds = new Set([n.id]);
      edges.forEach(e => {
        if (e.source === n.id) neighborIds.add(e.target);
        if (e.target === n.id) neighborIds.add(e.source);
      });
      focusedIds = neighborIds;
      selected = n;
      showDetails(n);
      alpha = 1;
      n.x = 0;
      n.y = 0;
      fit(false);
    }

    document.getElementById("focusBtn").onclick = () => {
      const matches = searchNodes(search.value);
      renderResults(matches);
      if (matches[0]) focusNode(matches[0]);
    };
    document.getElementById("clearBtn").onclick = () => {
      focusedIds = null;
      selected = null;
      search.value = "";
      results.innerHTML = "";
      showDetails(null);
      alpha = 1;
    };
    document.getElementById("fitBtn").onclick = () => fit(true);
    document.getElementById("restartBtn").onclick = () => {
      nodes.forEach((n, i) => {
        n.x = Math.cos(i * 2.399) * 220;
        n.y = Math.sin(i * 2.399) * 220;
        n.vx = 0;
        n.vy = 0;
        n.fixed = false;
      });
      alpha = 1;
      fit(false);
    };
    search.oninput = () => renderResults(searchNodes(search.value));
    relation.onchange = () => alpha = 1;
    degree.oninput = () => {
      degreeValue.textContent = degree.value;
      alpha = 1;
    };
    posChecks.onchange = () => alpha = 1;
    sourceChecks.onchange = () => alpha = 1;

    canvas.addEventListener("mousedown", e => {
      const n = nodeAt(e.clientX, e.clientY);
      lastMouse = {x: e.clientX, y: e.clientY};
      if (n) {
        dragging = n;
        n.fixed = true;
        showDetails(n);
      }
    });
    window.addEventListener("mousemove", e => {
      if (!lastMouse) return;
      if (dragging) {
        const rect = canvas.getBoundingClientRect();
        const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
        dragging.x = w.x;
        dragging.y = w.y;
        dragging.vx = 0;
        dragging.vy = 0;
      } else if (e.buttons) {
        offsetX += e.clientX - lastMouse.x;
        offsetY += e.clientY - lastMouse.y;
      }
      lastMouse = {x: e.clientX, y: e.clientY};
    });
    window.addEventListener("mouseup", () => {
      if (dragging) dragging.fixed = false;
      dragging = null;
      lastMouse = null;
    });
    canvas.addEventListener("click", e => {
      const n = nodeAt(e.clientX, e.clientY);
      if (n) showDetails(n);
    });
    canvas.addEventListener("wheel", e => {
      e.preventDefault();
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      const before = screenToWorld(mx, my);
      const factor = e.deltaY < 0 ? 1.1 : 0.9;
      scale = Math.max(0.18, Math.min(5, scale * factor));
      const after = screenToWorld(mx, my);
      offsetX += (after.x - before.x) * scale;
      offsetY += (after.y - before.y) * scale;
    }, {passive:false});

    window.addEventListener("resize", resize);
    resize();
    draw();
  </script>
</body>
</html>
